<head>

<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <!-- Firebase SDK via compat (sem module, sem problema de ordem) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyDRXpdtmXzGDDg523t8MUvgVdJy2PG-Yf4",
      authDomain: "copa-sylas.firebaseapp.com",
      databaseURL: "https://copa-sylas-default-rtdb.firebaseio.com",
      projectId: "copa-sylas",
      storageBucket: "copa-sylas.firebasestorage.app",
      messagingSenderId: "1028431178200",
      appId: "1:1028431178200:web:e97f9b0a4dc638e7bc6aad"
    });
    const _db = firebase.database();
    const _ref = _db.ref("copa_sylas");
    // Disponível imediatamente para o app.js
    window._fbSet    = (data) => _ref.set(data);
    window._fbListen = (cb)   => _ref.on("value", snap => cb(snap.val()));
    window._fbOff    = ()     => _ref.off();
    console.log("✅ Firebase pronto");
  </script>

  <script type="text/babel" src="app.js" data-type="module"></script>
</body>
