<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Copa Sylas 2026</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    const firebaseConfig = {
      apiKey: "AIzaSyDRXpdtmXzGDDg523t8MUvgVdJy2PG-Yf4",
      authDomain: "copa-sylas.firebaseapp.com",
      databaseURL: "https://copa-sylas-default-rtdb.firebaseio.com",
      projectId: "copa-sylas",
      storageBucket: "copa-sylas.firebasestorage.app",
      messagingSenderId: "1028431178200",
      appId: "1:1028431178200:web:e97f9b0a4dc638e7bc6aad"
    };
    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);
    // Expõe globalmente para o app.js usar
    window._fbSet    = (data) => set(ref(db,"copa_sylas"), data);
    window._fbListen = (cb)   => onValue(ref(db,"copa_sylas"), snap => cb(snap.val()));
  </script>
  <script type="text/babel" src="app.js" data-type="module"></script>
</body>
</html>
