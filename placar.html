<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#0a0f00;color:#e2e8f0;font-family:'Inter',sans-serif;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:#0a0f00;}
::-webkit-scrollbar-thumb{background:#FFDF0030;border-radius:3px;}

@keyframes flagScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes flagScroll2{from{transform:translateX(-50%)}to{transform:translateX(0)}}
@keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes champPop{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}

.flag-strip{overflow:hidden;flex-shrink:0;}
.flag-inner{display:flex;align-items:center;width:max-content;will-change:transform;}
.flag-fwd{animation:flagScroll 22s linear infinite;}
.flag-rev{animation:flagScroll2 26s linear infinite;}

.tab-btn{background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:10px 18px;color:rgba(255,255,255,.4);font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:1px;white-space:nowrap;transition:all .2s;}
.tab-btn.active{background:rgba(255,223,0,.15);border-color:rgba(255,223,0,.4);color:#FFDF00;font-weight:800;box-shadow:0 0 12px rgba(255,223,0,.15);}
.tab-btn:hover{background:rgba(255,223,0,.08);color:#FFDF00;}

.match-row{display:flex;align-items:center;padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px;transition:background .12s;}
.match-row:last-child{border-bottom:none;}
.badge-em-breve{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:6px 12px;font-size:10px;color:rgba(255,255,255,.3);letter-spacing:1px;}

.progress-bar{height:6px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;border-radius:4px;transition:width 1s ease;}
.mrow{display:flex;align-items:center;padding:0 10px;font-size:12px;transition:background .12s;}

.scroll-x-touch{
  overflow-x: auto;
  overflow-y: hidden;
  WebkitOverflowScrolling: touch;
  touch-action: pan-x;
  padding-bottom: 12px;
}
</style>

<script type="text/babel">
const { useState, useEffect } = React;

const MGOLD = "#FFDF00";
const MGREEN = "#009C3B";
const FLAG_CODES = ["BR","AR","FR","DE","PT","IT","ES","UY","JP","KR","NL","BE","CR","MX","GH","SN","AU","CH","PL","US","HR"];
const MODS_META = [
  {id:"tenis",    name:"Tênis de Mesa", emoji:"🏓", accent:"#e91e8c"},
  {id:"dama",     name:"Dama",          emoji:"♟️", accent:"#7c3aed"},
  {id:"queimada", name:"Queimada",      emoji:"🔥", accent:"#ea580c"},
  {id:"volei",    name:"Vôlei",         emoji:"🏐", accent:"#0ea5e9"},
  {id:"futsal",   name:"Futsal",        emoji:"⚽", accent:"#009C3B"},
];

const NIVEL_LABELS = {
  fund_masc: "📚 Fund. Masculino",
  fund_fem:  "📚 Fund. Feminino",
  em_masc:   "🎓 EM Masculino",
  em_fem:    "🎓 EM Feminino",
  misto:     "⚡ Misto"
};

function BRFlag({ size=22 }) {
  return <img src="https://flagsapi.com/BR/flat/64.png" alt="BR"
    onError={e=>e.target.src="https://flagcdn.com/w40/br.png"}
    style={{height:size,width:"auto",borderRadius:2}}/>;
}

function FlagStrip({ rev, h=40 }) {
  const all = [...FLAG_CODES,...FLAG_CODES,...FLAG_CODES];
  return (
    <div className="flag-strip" style={{height:h}}>
      <div className={`flag-inner ${rev?"flag-rev":"flag-fwd"}`}>
        {all.map((c,i)=>(
          <img key={i} src={`https://flagsapi.com/${c}/flat/64.png`} alt={c}
            onError={e=>e.target.src=`https://flagcdn.com/w40/${c.toLowerCase()}.png`}
            style={{height:c==="BR"?h*.82:h*.54,width:"auto",margin:"0 10px",borderRadius:2,
              filter:c==="BR"?"drop-shadow(0 0 6px rgba(0,156,59,.9))":"grayscale(30%) opacity(45%)"}}/>
        ))}
      </div>
    </div>
  );
}

const CARD_H=74, CARD_W=188, H_GAP=36, V_GAP=10;
function getMatchY(ri, mi, rounds) {
  if (rounds && rounds[0] && rounds[1] && rounds[0].matches.length < rounds[1].matches.length && ri === 0) {
    return mi * (CARD_H + V_GAP) * 2 + (CARD_H + V_GAP) / 2;
  }
  const f = Math.pow(2, ri);
  return (f - 1) * (CARD_H + V_GAP) / 2 + mi * f * (CARD_H + V_GAP);
}

function BracketView({ rounds, gc }) {
  const champ = rounds[rounds.length-1]?.matches[0]?.winner;
  const maxMatches = Math.max(...rounds.map(r => r.matches.length));
  const totalH = maxMatches * (CARD_H + V_GAP) + 80;
  const totalW = rounds.length * (CARD_W + H_GAP) + (champ ? 220 : 40);

  // Gera linhas SVG fora do JSX para evitar problema com arrays aninhados
  const svgLines = [];
  rounds.forEach((round,ri)=>{
    if(ri===rounds.length-1) return;
    const isPlayIn = round.matches.length < rounds[ri+1].matches.length;
    round.matches.forEach((match,mi)=>{
      const x1=ri*(CARD_W+H_GAP)+CARD_W;
      const y1=getMatchY(ri,mi,rounds)+CARD_H/2+24;
      const nmi=isPlayIn?mi*2:Math.floor(mi/2);
      const x2=(ri+1)*(CARD_W+H_GAP);
      const y2=getMatchY(ri+1,nmi,rounds)+CARD_H/2+24;
      const mx=x1+H_GAP/2;
      const won=match.winner!==null;
      const lc=won?gc:"rgba(255,255,255,.1)";
      const sw=won?2:1.5;
      const da=won?"none":"5,4";
      svgLines.push(<line key={ri+"-"+mi+"a"} x1={x1} y1={y1} x2={mx} y2={y1} stroke={lc} strokeWidth={sw} strokeDasharray={da}/>);
      svgLines.push(<line key={ri+"-"+mi+"b"} x1={mx} y1={y1} x2={mx} y2={y2} stroke={lc} strokeWidth={sw} strokeDasharray={da}/>);
      svgLines.push(<line key={ri+"-"+mi+"c"} x1={mx} y1={y2} x2={x2} y2={y2} stroke={lc} strokeWidth={sw} strokeDasharray={da}/>);
      if(won) svgLines.push(<circle key={ri+"-"+mi+"d"} cx={x2} cy={y2} r={3.5} fill={gc}/>);
    });
  });

  return (
    <div className="scroll-x-touch">
      <div style={{position:"relative",width:totalW,height:totalH,margin:"0 auto"}}>

        {/* Linhas SVG */}
        <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none",overflow:"visible"}}>
          {svgLines}
        </svg>

        {/* Cards das Partidas */}
        {rounds.map((round,ri)=>(
          <div key={round.id || ri}>
            <div style={{position:"absolute",left:ri*(CARD_W+H_GAP),top:0,width:CARD_W,textAlign:"center"}}>
              <span style={{fontSize:9,fontWeight:800,letterSpacing:1.5,textTransform:"uppercase",color:gc,padding:"4px 10px",background:`${gc}14`,borderRadius:4,display:"inline-block"}}>{round.name}</span>
            </div>
            {round.matches.map((match,mi)=>{
              const x=ri*(CARD_W+H_GAP);
              const y=getMatchY(ri,mi,rounds)+24;
              const isEmpty=!match.p1&&!match.p2;
              return (
                <div key={match.id || mi} style={{position:"absolute",left:x,top:y,width:CARD_W,height:CARD_H,
                  background:isEmpty?"rgba(255,255,255,.01)":"rgba(255,255,255,.04)",
                  border:`1px solid ${match.winner?gc+"44":"rgba(255,255,255,.08)"}`,
                  borderRadius:8,overflow:"hidden",opacity:isEmpty?.25:1,
                  boxShadow:match.winner?`0 0 12px ${gc}18`:"none"}}>
                  {[match.p1,match.p2].map((n,pi)=>(
                    <div key={pi} className="mrow"
                      style={{height:"50%",
                        borderBottom:pi===0?"1px solid rgba(255,255,255,.06)":"none",
                        background:match.winner===n?`${gc}22`:"transparent",
                        color:match.winner===n?gc:n&&n!=="BYE"?"#e2e8f0":"rgba(255,255,255,.2)",
                        fontWeight:match.winner===n?800:400}}>
                      {match.winner===n&&<div style={{width:12,height:12,borderRadius:"50%",background:gc,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#0a0f00",fontWeight:900,flexShrink:0,marginRight:6}}>✓</div>}
                      <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n||"—"}</span>
                      {n==="BYE"&&<span style={{fontSize:9,color:"#64748b",marginLeft:"auto"}}>bye</span>}
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        ))}

        {/* Campeão Display */}
        {champ&&(
          <div style={{position:"absolute",left:rounds.length*(CARD_W+H_GAP)+8,top:getMatchY(rounds.length-1,0,rounds)+24,
            display:"flex",flexDirection:"column",alignItems:"center",gap:6,animation:"champPop .5s ease"}}>
            <div style={{fontSize:9,fontWeight:800,letterSpacing:3,color:MGOLD}}>★ CAMPEÃO ★</div>
            <div style={{background:"linear-gradient(135deg,#FFDF00,#FFB800,#cc8800)",color:"#0a0f00",
              borderRadius:10,padding:"12px 20px",fontWeight:900,fontSize:14,
              boxShadow:"0 0 25px rgba(255,223,0,.4)",border:"2px solid rgba(255,255,255,.3)",whiteSpace:"nowrap"}}>
              🏆 {champ}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function RoundRobinView({ gData, gc }) {
  const rounds = gData.rounds || [];
  const teams = gData.teams || [];
  
  // Calcula tabela estável e ordenada
  const table = {};
  teams.forEach(t => table[t]={time:t,j:0,v:0,e:0,d:0,gp:0,gc:0,pts:0});
  rounds.forEach(r => r.matches?.forEach(m => {
    if(m.gols1===null||m.gols2===null||m.gols1===""||m.gols2==="") return;
    const g1=parseInt(m.gols1), g2=parseInt(m.gols2);
    if(isNaN(g1)||isNaN(g2)||!table[m.p1]||!table[m.p2]) return;
    table[m.p1].j++; table[m.p2].j++;
    table[m.p1].gp+=g1; table[m.p1].gc+=g2;
    table[m.p2].gp+=g2; table[m.p2].gc+=g1;
    if(g1>g2){table[m.p1].v++;table[m.p1].pts+=3;table[m.p2].d++;}
    else if(g2>g1){table[m.p2].v++;table[m.p2].pts+=3;table[m.p1].d++;}
    else{table[m.p1].e++;table[m.p1].pts++;table[m.p2].e++;table[m.p2].pts++;}
  }));
  const class_ = Object.values(table).sort((a,b)=>b.pts-a.pts||(b.gp-b.gc)-(a.gp-a.gc)||b.gp-a.gp);

  return (
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(290px, 1fr))",gap:24,animation:"fadeIn .4s ease"}}>
      {/* Jogos Recentes / Placar */}
      <div>
        <div style={{fontSize:11,fontWeight:800,letterSpacing:2,color:gc,marginBottom:12,textTransform:"uppercase"}}>📋 Rodadas de Confrontos</div>
        <div style={{maxHeight:450,overflowY:"auto",paddingRight:4,display:"flex",flexDirection:"column",gap:8}}>
          {rounds.map(r => {
            const ativos = r.matches?.filter(m=>m.gols1!==null&&m.gols2!==null) || [];
            if(ativos.length===0) return null;
            return (
              <div key={r.id} style={{background:"rgba(255,255,255,.02)",padding:12,borderRadius:8,border:"1px solid rgba(255,255,255,.05)"}}>
                <div style={{fontSize:10,fontWeight:700,color:gc,marginBottom:8}}>{r.name}</div>
                {r.matches.map(m => {
                  const done = m.gols1!==null && m.gols2!==null;
                  if(!done) return null;
                  return (
                    <div key={m.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 0",fontSize:12}}>
                      <span style={{flex:1,textAlign:"right",color:m.winner===m.p1?gc:"#fff",fontWeight:m.winner===m.p1?700:400}}>{m.p1}</span>
                      <span style={{background:"rgba(255,255,255,.06)",padding:"2px 8px",borderRadius:4,fontFamily:"'Bebas Neue'",fontSize:15,color:MGOLD,margin:"0 10px"}}>{m.gols1} × {m.gols2}</span>
                      <span style={{flex:1,color:m.winner===m.p2?gc:"#fff",fontWeight:m.winner===m.p2?700:400}}>{m.p2}</span>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      </div>

      {/* Classificação Geral */}
      <div>
        <div style={{fontSize:11,fontWeight:800,letterSpacing:2,color:MGOLD,marginBottom:12,textTransform:"uppercase"}}>🏆 Classificação Atualizada</div>
        <div style={{background:"rgba(255,255,255,.01)",borderRadius:8,border:"1px solid rgba(255,255,255,.06)",overflowX:"auto"}}>
          <div style={{display:"grid",gridTemplateColumns:"30px 1fr 30px 30px 35px",padding:"8px 12px",background:"rgba(255,255,255,.04)",fontSize:9,color:"rgba(255,255,255,.4)",fontWeight:700}}>
            <span>#</span><span>Time</span><span style={{textAlign:"center"}}>V</span><span style={{textAlign:"center"}}>SG</span><span style={{textAlign:"center",color:MGOLD}}>PTS</span>
          </div>
          {class_.map((t,i)=>(
            <div key={t.time} style={{display:"grid",gridTemplateColumns:"30px 1fr 30px 30px 35px",padding:"10px 12px",borderTop:"1px solid rgba(255,255,255,.04)",alignItems:"center",fontSize:13,background:i===0?"rgba(255,223,0,.03)":"transparent"}}>
              <span style={{fontFamily:"'Bebas Neue'",fontSize:16,color:i===0?MGOLD:i===1?"#94a3b8":"rgba(255,255,255,.3)"}}>{i+1}</span>
              <span style={{fontWeight:i===0?700:400}}>{t.time}</span>
              <span style={{textAlign:"center",fontSize:11,color:"rgba(255,255,255,.5)"}}>{t.v}</span>
              <span style={{textAlign:"center",fontSize:11,color:"rgba(255,255,255,.5)"}}>{t.gp - t.gc}</span>
              <span style={{textAlign:"center",fontWeight:800,color:i===0?MGOLD:"#fff"}}>{t.pts}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function AoVivoTab({ mods }) {
  const [modIdx, setModIdx] = useState(0);
  const [catIdx, setCatIdx] = useState(0);
  const ativas = mods.filter(m => m.ativo);

  useEffect(() => {
    if(ativas.length === 0) return;
    const interval = setInterval(() => {
      setModIdx(prev => (prev + 1) % ativas.length);
      setCatIdx(0); // Reseta a subcategoria ao rotacionar esporte
    }, 12000);
    return () => clearInterval(interval);
  }, [ativas.length]);

  if(ativas.length === 0) return (
    <div style={{textAlign:"center",padding:"80px 20px",animation:"fadeIn .4s ease"}}>
      <div style={{fontSize:56,marginBottom:16,opacity:.2}}>🔒</div>
      <div style={{color:"rgba(255,255,255,.3)",fontSize:14,letterSpacing:2,fontWeight:700}}>JOGOS EM PREPARAÇÃO</div>
      <div style={{color:"rgba(255,255,255,.15)",fontSize:11,marginTop:6}}>Os coordenadores estão organizando as chaves. Aguarde o início!</div>
    </div>
  );

  const mod = ativas[modIdx % ativas.length];
  const meta = MODS_META.find(m => m.id === mod.id) || {accent:"#FFDF00",emoji:"🏅"};
  
  // Mapeia chaves de categorias disponíveis (fund_masc, misto, etc.)
  const categoriasKeys = Object.keys(mod.genders || {}).filter(k => {
    const gd = mod.genders[k];
    return gd && (gd.tipo === "roundrobin" || gd.rounds?.some(r => r.matches.some(m => m.p1 || m.p2)));
  });

  const currentCatKey = categoriasKeys[catIdx % (categoriasKeys.length || 1)] || "misto";
  const gData = mod.genders[currentCatKey];
  const isRoundRobin = gData?.tipo === "roundrobin";
  const gc = currentCatKey.includes("fem") ? "#e91e8c" : currentCatKey.includes("masc") ? "#1565C0" : meta.accent;

  return (
    <div style={{padding:"20px 24px",flex:1,display:"flex",flexDirection:"column"}}>
      {/* Banner Principal Rotativo */}
      <div style={{background:`linear-gradient(135deg, ${meta.accent}12, #050a00)`, border:`1px solid ${meta.accent}25`, borderRadius:12, padding:"20px 24px", marginBottom:20, position:"relative", overflow:"hidden", animation:"fadeIn .5s ease"}}>
        <div style={{display:"flex",alignItems:"center",gap:16,zIndex:2,position:"relative"}}>
          <span style={{fontSize:42,filter:`drop-shadow(0 0 10px ${meta.accent})`}}>{meta.emoji}</span>
          <div style={{flex:1}}>
            <span style={{fontSize:10,fontWeight:800,letterSpacing:3,color:meta.accent,background:`${meta.accent}15`,padding:"3px 8px",borderRadius:4}}>MODALIDADE EM ANDAMENTO</span>
            <div style={{fontFamily:"'Bebas Neue'",fontSize:36,color:"#fff",letterSpacing:2,lineHeight:1.1,marginTop:4}}>{mod.name}</div>
            <div style={{fontSize:12,color:gc,fontWeight:700,letterSpacing:1,marginTop:2}}>{NIVEL_LABELS[currentCatKey] || ""}</div>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:"#ef4444",animation:"pulse 1s infinite"}}/>
            <span style={{fontSize:10,color:"#ef4444",fontWeight:900,letterSpacing:2}}>AO VIVO</span>
          </div>
        </div>
      </div>

      {/* Renderização do Tipo de Competição */}
      <div style={{flex:1}}>
        {gData ? (
          isRoundRobin ? (
            <RoundRobinView gData={gData} gc={gc} />
          ) : (
            <div style={{animation:"fadeIn .4s ease"}}>
              <div style={{fontSize:11,fontWeight:800,letterSpacing:2,color:"rgba(255,255,255,.3)",marginBottom:14,textTransform:"uppercase"}}>🌳 Chave de Eliminatórias</div>
              <BracketView rounds={gData.rounds || []} gc={gc} />
            </div>
          )
        ) : (
          <div style={{color:"rgba(255,255,255,.2)",fontSize:12,textAlign:"center",padding:40}}>Nenhum dado estruturado nesta categoria.</div>
        )}
      </div>
    </div>
  );
}

function calcClassificacao(teams, rounds) {
  const table = {};
  teams.forEach(t => table[t]={time:t,j:0,v:0,e:0,d:0,gp:0,gc:0,pts:0});
  rounds.forEach(r => r.matches.forEach(m => {
    const v1=m.gols1, v2=m.gols2;
    if(v1===null||v1===undefined||v1===""||v1==="null") return;
    if(v2===null||v2===undefined||v2===""||v2==="null") return;
    const g1=parseInt(v1), g2=parseInt(v2);
    if(isNaN(g1)||isNaN(g2)) return;
    if(!table[m.p1]||!table[m.p2]) return;
    table[m.p1].j++; table[m.p2].j++;
    table[m.p1].gp+=g1; table[m.p1].gc+=g2;
    table[m.p2].gp+=g2; table[m.p2].gc+=g1;
    if(g1>g2){table[m.p1].v++;table[m.p1].pts+=3;table[m.p2].d++;}
    else if(g2>g1){table[m.p2].v++;table[m.p2].pts+=3;table[m.p1].d++;}
    else{table[m.p1].e++;table[m.p1].pts++;table[m.p2].e++;table[m.p2].pts++;}
  }));
  return Object.values(table).sort((a,b)=>b.pts-a.pts||(b.gp-b.gc)-(a.gp-a.gc)||b.gp-a.gp);
}

function ChaveamentoTab({ mods }) {
  return (
    <div style={{padding:"20px 24px",animation:"fadeIn .5s ease"}}>
      {mods.map(mod => {
        const meta = MODS_META.find(m => m.id === mod.id) || {accent:"#FFDF00",emoji:"🏅"};
        if(!mod.ativo) return null;
        return (
          <div key={mod.id} style={{marginBottom:32,background:"rgba(255,255,255,.01)",border:"1px solid rgba(255,255,255,.04)",borderRadius:12,padding:16}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,borderBottom:`1px solid ${meta.accent}22`,paddingBottom:8}}>
              <span style={{fontSize:24}}>{meta.emoji}</span>
              <span style={{fontFamily:"'Bebas Neue'",fontSize:24,color:meta.accent,letterSpacing:2}}>{mod.name}</span>
            </div>
            {Object.keys(mod.genders || {}).map(gKey => {
              const gd = mod.genders[gKey];
              const gc = gKey.includes("fem") ? "#e91e8c" : gKey.includes("masc") ? "#1565C0" : meta.accent;
              if(!gd || gd.tipo === "roundrobin") return null;
              return (
                <div key={gKey} style={{marginBottom:20}}>
                  <div style={{fontSize:11,fontWeight:800,color:gc,marginBottom:10,letterSpacing:1}}>{NIVEL_LABELS[gKey]}</div>
                  <BracketView rounds={gd.rounds} gc={gc} />
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

function RankingTab({ mods }) {
  const ativas = mods.filter(m=>m.ativo);
  return (
    <div style={{padding:"20px 24px", animation:"fadeIn .5s ease"}}>
      <div style={{textAlign:"center",marginBottom:24}}>
        <div style={{fontFamily:"'Bebas Neue'",fontSize:26,letterSpacing:5,color:"#FFDF00"}}>🥇 CLASSIFICAÇÃO GERAL</div>
        <div style={{display:"flex",gap:10,marginTop:10,justifyContent:"center",flexWrap:"wrap"}}>
          {[["🏆 Campeão","10pts","#FFDF00"],["🥈 Vice","7pts","#94a3b8"],["🏅 Semifinal","5pts","#cd7f32"],["✅ Classificado","2pts","rgba(255,255,255,.4)"]].map(([l,p,c])=>(
            <div key={l} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.1)",borderRadius:5,padding:"4px 10px",display:"flex",gap:6,alignItems:"center"}}>
              <span style={{fontSize:11}}>{l}</span><span style={{fontWeight:800,color:c,fontSize:11}}>{p}</span>
            </div>
          ))}
        </div>
      </div>
      {ativas.length===0 && <div style={{textAlign:"center",color:"rgba(255,255,255,.3)",padding:40}}>Nenhuma modalidade iniciada ainda.</div>}
      {mods.map(mod=>{
        const meta=MODS_META.find(m=>m.id===mod.id)||{accent:"#FFDF00",emoji:"🏅"};
        if(!mod.ativo) return null;
        // Ranking do futsal (roundrobin)
        const mistoGd = mod.genders?.misto;
        if(mistoGd?.tipo==="roundrobin") {
          const class_=calcClassificacao(mistoGd.teams||[],mistoGd.rounds||[]);
          return (
            <div key={mod.id} style={{marginBottom:28}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                <span style={{fontSize:22}}>{meta.emoji}</span>
                <span style={{fontFamily:"'Bebas Neue'",fontSize:20,color:meta.accent,letterSpacing:3}}>{mod.name}</span>
              </div>
              <div style={{background:"rgba(255,255,255,.02)",borderRadius:10,overflowX:"auto",border:"1px solid rgba(255,255,255,.07)"}}>
                <div style={{display:"grid",gridTemplateColumns:"40px 1fr 36px 36px 36px 36px 44px 44px 48px",minWidth:460,padding:"8px 14px",background:"rgba(255,255,255,.05)",fontSize:9,letterSpacing:2,color:"rgba(255,255,255,.35)",textTransform:"uppercase",gap:4}}>
                  <span>#</span><span>Time</span><span style={{textAlign:"center"}}>J</span><span style={{textAlign:"center"}}>V</span><span style={{textAlign:"center"}}>E</span><span style={{textAlign:"center"}}>D</span><span style={{textAlign:"center"}}>GP</span><span style={{textAlign:"center"}}>GC</span><span style={{textAlign:"center",fontWeight:800,color:"#FFDF00"}}>PTS</span>
                </div>
                {class_.map((t,i)=>(
                  <div key={t.time} style={{display:"grid",gridTemplateColumns:"40px 1fr 36px 36px 36px 36px 44px 44px 48px",minWidth:460,padding:"10px 14px",borderTop:"1px solid rgba(255,255,255,.04)",background:i===0?"rgba(255,223,0,.05)":"transparent",gap:4,alignItems:"center"}}>
                    <span style={{fontFamily:"'Bebas Neue'",fontSize:18,color:i===0?"#FFDF00":i===1?"#94a3b8":i===2?"#cd7f32":"rgba(255,255,255,.3)",textAlign:"center"}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</span>
                    <span style={{fontWeight:i===0?800:400,fontSize:13,color:i===0?"#FFDF00":"#e2e8f0"}}>{t.time}</span>
                    {[t.j,t.v,t.e,t.d,t.gp,t.gc].map((v,vi)=><span key={vi} style={{textAlign:"center",fontSize:12,color:"rgba(255,255,255,.5)"}}>{v}</span>)}
                    <span style={{textAlign:"center",fontWeight:800,fontSize:15,color:i===0?"#FFDF00":"rgba(255,255,255,.7)"}}>{t.pts}</span>
                  </div>
                ))}
              </div>
            </div>
          );
        }
        // Ranking de chaveamento — mostra campeões
        const campeoes = Object.entries(mod.genders||{}).map(([gKey,gd])=>{
          if(!gd||gd.tipo==="roundrobin") return null;
          const campeao=gd.rounds[gd.rounds.length-1]?.matches[0]?.winner;
          if(!campeao) return null;
          const gc=gKey.includes("fem")?"#e91e8c":gKey.includes("masc")?"#1565C0":meta.accent;
          return {label:NIVEL_LABELS[gKey]||gKey, campeao, gc};
        }).filter(Boolean);
        if(campeoes.length===0) return null;
        return (
          <div key={mod.id} style={{marginBottom:28}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              <span style={{fontSize:22}}>{meta.emoji}</span>
              <span style={{fontFamily:"'Bebas Neue'",fontSize:20,color:meta.accent,letterSpacing:3}}>{mod.name}</span>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:12}}>
              {campeoes.map(({label,campeao,gc})=>(
                <div key={label} style={{background:"linear-gradient(135deg,rgba(255,223,0,.12),rgba(255,180,0,.05))",border:"2px solid rgba(255,223,0,.3)",borderRadius:10,padding:"16px 20px",display:"flex",flexDirection:"column",alignItems:"center",gap:8,minWidth:160}}>
                  <div style={{fontSize:9,letterSpacing:2,color:"rgba(255,255,255,.4)",textTransform:"uppercase"}}>{label}</div>
                  <div style={{fontSize:32}}>🏆</div>
                  <div style={{fontWeight:900,fontSize:15,color:"#FFDF00",textAlign:"center"}}>{campeao}</div>
                  <div style={{fontSize:11,color:"rgba(255,223,0,.4)"}}>★ CAMPEÃO ★</div>
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("ao-vivo");
  const [data, setData] = useState(null);

  useEffect(() => {
    const tryListen=()=>{
      if(window._fbListen){
        window._fbListen((fbData)=>{
          if(fbData&&fbData.mods) setData(fbData);
        });
        return true;
      }
      return false;
    };
    if(!tryListen()){
      const iv=setInterval(()=>{if(tryListen())clearInterval(iv);},200);
      return()=>clearInterval(iv);
    }
  }, []);

  const mods = data?.mods || [];

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",background:"#0a0f00"}}>
      <header style={{background:"rgba(3,7,0,.97)",backdropFilter:"blur(12px)",borderBottom:"3px solid #FFDF00",padding:"10px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,boxShadow:"0 4px 20px rgba(255,223,0,.08)",flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:36,height:34,borderRadius:"50%",background:"linear-gradient(135deg,#009C3B,#002776)",border:"2px solid #FFDF00",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🏆</div>
          <div>
            <div style={{fontFamily:"'Bebas Neue'",fontSize:22,letterSpacing:3,color:"#FFDF00",lineHeight:1}}>COPA SYLAS 2026</div>
            <div style={{fontSize:8,color:"rgba(255,255,255,.3)",letterSpacing:2,marginTop:2}}>PLACAR OFICIAL · AO VIVO</div>
          </div>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          <button className={`tab-btn ${tab==="ao-vivo"?"active":""}`} onClick={()=>setTab("ao-vivo")}>📺 Ao Vivo</button>
          <button className={`tab-btn ${tab==="chaves"?"active":""}`} onClick={()=>setTab("chaves")}>🏆 Chaveamento</button>
          <button className={`tab-btn ${tab==="ranking"?"active":""}`} onClick={()=>setTab("ranking")}>🥇 Ranking</button>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:"#ef4444",animation:"pulse 1s ease-in-out infinite"}}/>
          <span style={{fontSize:9,color:"#ef4444",fontWeight:700,letterSpacing:2}}>AO VIVO</span>
        </div>
      </header>

      <FlagStrip h={36}/>

      <main style={{flex:1}}>
        {data===null ? (
          <div style={{textAlign:"center",padding:"80px 20px"}}>
            <div style={{fontSize:44,animation:"spin 2s linear infinite",display:"inline-block"}}>⚙️</div>
            <div style={{color:"rgba(255,255,255,.3)",fontSize:13,marginTop:12,letterSpacing:2}}>Conectando ao Firebase...</div>
          </div>
        ) : (
          <>
            {tab==="ao-vivo"  && <AoVivoTab mods={mods}/>}
            {tab==="chaves"   && <ChaveamentoTab mods={mods}/>}
            {tab==="ranking"  && <RankingTab mods={mods}/>}
          </>
        )}
      </main>

      <FlagStrip rev h={32}/>

      <footer style={{background:"linear-gradient(135deg,#002776,#001a0a,#002776)",borderTop:"2px solid #FFDF00",padding:"10px 20px",textAlign:"center",fontSize:11,color:"rgba(255,223,0,.4)",fontFamily:"'Bebas Neue'",letterSpacing:3}}>
        COPA SYLAS 2026 · E.E. SYLAS BALTAZAR DE ARAÚJO · MIRACATU – SP
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
